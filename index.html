<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamMate - Find Your Hackathon Team</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>TeamMate</h1>
        <p>Find your perfect team for hackathons and projects!</p>
    </header>

    <!-- Main Section -->
    <main>

        <section class="profile-section">
            <h2>Create Your Profile</h2>
            <form id="profile-form">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name" required>

                <label for="skills">Skills (comma-separated):</label>
                <input type="text" id="skills" placeholder="e.g., Frontend, Backend, UI/UX" required>

                <label for="availability">Availability (hours/week):</label>
                <input type="number" id="availability" min="1" max="40" required>

                <label for="preferences">Project Preferences:</label>
                <input type="text" id="preferences" placeholder="e.g., Healthcare, EdTech" required>

                <button type="submit">Submit</button>
            </form>
        </section>

       
        <section class="team-section">
            <h2>Suggested Teams</h2>
            <ul id="team-list">
            </ul>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2025 TeamMate | All Rights Reserved</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
